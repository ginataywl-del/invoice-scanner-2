<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Scanner — Staff Portal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f8f8f6;--bg3:#f2f1ed;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a0a0;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --info-bg:#EBF4FD;--info:#0C447C;
    --success-bg:#EAF3DE;--success:#27500A;
    --warn-bg:#FAEEDA;--warn:#633806;
    --danger-bg:#FCEBEB;--danger:#791F1F;
    --radius:8px;--radius-lg:12px;
    --font:'Segoe UI',system-ui,sans-serif;--mono:'Courier New',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
      --text:#f0ede8;--text2:#a0a09a;--text3:#6b6b65;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
      --info-bg:#0c2240;--info:#85B7EB;
      --success-bg:#172404;--success:#97C459;
      --warn-bg:#241800;--warn:#FAC775;
      --danger-bg:#200a0a;--danger:#F09595;
    }
  }
  body{font-family:var(--font);font-size:14px;background:var(--bg3);color:var(--text);min-height:100vh}
  .shell{max-width:680px;margin:0 auto;padding:16px}
  .header{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:15px;font-weight:600;color:var(--text)}
  .role-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--info-bg);color:var(--info)}
  .tabs{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px;margin-bottom:16px;gap:4px}
  .tab{flex:1;padding:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-radius:var(--radius);transition:all 0.15s;text-align:center}
  .tab.active{background:var(--text);color:var(--bg)}
  .panel{display:none}.panel.active{display:block}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px}
  .btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text);transition:all 0.15s;font-family:var(--font)}
  .btn:hover{background:var(--bg2)}
  .btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
  .btn.primary:hover{opacity:0.85}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .field label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
  .field input,.field select{padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:var(--font);width:100%}
  .field input:focus,.field select:focus{outline:none;border-color:var(--text3)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .st{padding:9px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:10px;display:none}
  .st.info{background:var(--info-bg);color:var(--info);display:block}
  .st.success{background:var(--success-bg);color:var(--success);display:block}
  .st.error{background:var(--danger-bg);color:var(--danger);display:block}
  .st.warn{background:var(--warn-bg);color:var(--warn);display:block}
  .progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px;display:none;overflow:hidden}
  .progress.on{display:block}
  .progress-bar{height:100%;background:var(--text);transition:width 0.3s;width:0%}
  .upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:2rem;text-align:center;cursor:pointer;background:var(--bg2);transition:all 0.2s;margin-bottom:12px}
  .upload-zone:hover,.upload-zone:active{border-color:var(--text3);background:var(--bg)}
  .bulk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-bottom:10px}
  .thumb{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:1;border:0.5px solid var(--border)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .tstat{position:absolute;bottom:0;left:0;right:0;padding:3px;font-size:10px;font-weight:600;text-align:center}
  .tstat.pending{background:rgba(0,0,0,0.5);color:#fff}
  .tstat.done{background:#639922cc;color:#fff}
  .tstat.err{background:#E24B4Acc;color:#fff}
  .tstat.processing{background:#185FA5cc;color:#fff}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:7px 10px;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;border-bottom:0.5px solid var(--border)}
  td{padding:8px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--bg2)}
  .bpill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:var(--info-bg);color:var(--info)}
  .src-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
  .src-scan{background:#E1F5EE;color:#085041}
  .src-bulk{background:#E6F1FB;color:#0C447C}
  .empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
  .frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
  .metric{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
  .mlabel{font-size:11px;color:var(--text2);margin-bottom:2px}
  .mval{font-size:18px;font-weight:600;color:var(--text)}
  .mode-select{display:flex;gap:6px;margin-bottom:12px}
  .mode-btn{flex:1;padding:8px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s}
  .mode-btn.active{background:var(--bg2);color:var(--text);border-color:var(--border2)}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div class="logo">Invoice Scanner</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">Staff portal</div>
    </div>
    <span class="role-badge">Staff access</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('scan')">Scan Invoice</button>
    <button class="tab" onclick="sw('records')">My Records</button>
  </div>

  <!-- SCAN -->
  <div id="tab-scan" class="panel active">
    <div class="card">
      <div class="field">
        <label>Branch *</label>
        <select id="s-branch">
          <option value="">— Select your branch —</option>
          <option>NN Hillv2</option><option>NN NUH</option><option>NN Metro</option>
          <option>NN West Coast</option><option>HC West Coast</option>
        </select>
      </div>

      <div class="mode-select">
        <button class="mode-btn active" id="mode-bulk" onclick="setMode('bulk')">Bulk upload</button>
        <button class="mode-btn" id="mode-single" onclick="setMode('single')">Single invoice</button>
      </div>

      <!-- BULK -->
      <div id="bulk-zone">
        <div class="upload-zone" onclick="document.getElementById('bulk-fi').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handleBulk(event.dataTransfer.files)">
          <input type="file" id="bulk-fi" accept="image/*,application/pdf" multiple style="display:none" onchange="handleBulk(this.files)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <p style="font-size:14px;font-weight:500;margin-bottom:4px">Tap to select photos</p>
          <p style="font-size:12px;color:var(--text3)">Choose from gallery or camera · JPG, PNG, PDF</p>
        </div>
        <div id="bulk-thumbs" class="bulk-grid" style="display:none"></div>
        <div class="progress" id="bp"><div class="progress-bar" id="bpb"></div></div>
        <div class="st" id="bulk-st"></div>
        <div id="bulk-actions" style="display:none;display:none;gap:8px;align-items:center">
          <button class="btn primary" onclick="processBulk()">Extract &amp; Save All</button>
          <button class="btn" onclick="clearBulk()">Clear</button>
          <span id="bulk-count" style="font-size:12px;color:var(--text2)"></span>
        </div>
      </div>

      <!-- SINGLE -->
      <div id="single-zone" style="display:none">
        <div class="upload-zone" onclick="document.getElementById('sfi').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handleSingle(event.dataTransfer.files[0])">
          <input type="file" id="sfi" accept="image/*,application/pdf" style="display:none" onchange="handleSingle(this.files[0])">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;color:var(--text3)"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p style="font-size:14px;font-weight:500;margin-bottom:4px">Upload invoice</p>
          <p style="font-size:12px;color:var(--text3)">JPG, PNG or PDF</p>
        </div>
        <div id="single-body" style="display:none">
          <img id="prev" style="max-width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:10px;display:block">
          <div class="progress" id="sp"><div class="progress-bar" id="spb"></div></div>
          <div class="st" id="single-st"></div>
          <div class="g2">
            <div class="field"><label>Date</label><input id="f-date" placeholder="DD/MM/YYYY"></div>
            <div class="field"><label>Supplier</label><input id="f-sup"></div>
            <div class="field"><label>Invoice no.</label><input id="f-inv"></div>
            <div class="field"><label>Total (incl. GST)</label><input id="f-tot" type="number" step="0.01"></div>
            <div class="field"><label>GST</label><input id="f-gst" type="number" step="0.01"></div>
            <div class="field"><label>Subtotal</label><input id="f-sub" type="number" step="0.01"></div>
          </div>
          <div class="field"><label>Line items</label>
            <div id="li-disp" style="min-height:36px;padding:8px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text2);background:var(--bg2)">—</div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            <button class="btn primary" id="save-btn" onclick="saveSingle()">Save Invoice</button>
            <button class="btn" onclick="doExtract()">Re-extract</button>
            <button class="btn" onclick="resetSingle()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RECORDS -->
  <div id="tab-records" class="panel">
    <div class="frow">
      <select id="r-branch" onchange="renderRecords()" style="padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font)">
        <option value="">All branches</option>
        <option>NN Hillv2</option><option>NN NUH</option><option>NN Metro</option>
        <option>NN West Coast</option><option>HC West Coast</option>
      </select>
      <select id="r-month" onchange="renderRecords()" style="padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font)">
        <option value="">All months</option>
      </select>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="metric-row" id="r-metrics"></div>
    <div class="card" style="padding:0;overflow:hidden">
      <div id="r-body"></div>
    </div>
  </div>
</div>

<script>
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const S={invoices:[],curB64:null,curMime:null,curItems:[],bulkQ:[],gsUrl:''};

// Load shared Google Sheets URL from localStorage if set by owner
try{const u=localStorage.getItem('gs_url');if(u)S.gsUrl=u;}catch(e){}

function sw(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['scan','records'][i]===n));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='records'){popMonths();renderRecords();}
}

function setMode(m){
  document.getElementById('mode-bulk').classList.toggle('active',m==='bulk');
  document.getElementById('mode-single').classList.toggle('active',m==='single');
  document.getElementById('bulk-zone').style.display=m==='bulk'?'block':'none';
  document.getElementById('single-zone').style.display=m==='single'?'block':'none';
}

function setSt(id,msg,type){const b=document.getElementById(id);if(!b)return;b.className='st '+type;b.textContent=msg;}
function setP(pid,bid,pct){const p=document.getElementById(pid);const b=document.getElementById(bid);if(!p||!b)return;if(pct===null){p.classList.remove('on');return;}p.classList.add('on');b.style.width=pct+'%';}
function parseDt(ds){if(!ds)return null;if(ds.includes('-')){const p=ds.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}const p=ds.split('/');return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):null;}

async function extract(b64,mime){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Extract from this invoice. Return ONLY valid JSON:\n{"date":"DD/MM/YYYY","supplier":"name","invoiceNum":"ref","total":0,"gst":0,"subtotal":0,"lineItems":[{"desc":"item","qty":1,"unit":"","unitPrice":0,"amount":0}]}\nUse 0 for missing numbers. Return ONLY the JSON.'}]}]})});
  const d=await r.json();
  return JSON.parse(d.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
}

function buildInv(ex,branch,source){
  const d=parseDt(ex.date);
  return{id:Date.now()+Math.random(),savedAt:new Date().toISOString(),source,branch,date:ex.date||'',month:d?MONTHS[d.getMonth()]:'',monthNum:d?d.getMonth():0,year:d?d.getFullYear():'',supplier:ex.supplier||'',invoiceNum:ex.invoiceNum||'',total:+ex.total||0,gst:+ex.gst||0,subtotal:+ex.subtotal||0,lineItems:ex.lineItems||[]};
}

async function pushGS(inv){
  if(!S.gsUrl)return;
  try{await fetch(S.gsUrl,{method:'POST',body:JSON.stringify({...inv,lineItems:JSON.stringify(inv.lineItems)})});}catch(e){}
}

// BULK
function handleBulk(files){
  if(!files||!files.length)return;
  S.bulkQ=[];
  document.getElementById('bulk-thumbs').style.display='grid';
  document.getElementById('bulk-actions').style.display='flex';
  document.getElementById('bulk-thumbs').innerHTML='';
  document.getElementById('bulk-count').textContent=files.length+' file'+(files.length>1?'s':'')+' ready';
  Array.from(files).forEach((f,i)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      S.bulkQ.push({b64:e.target.result.split(',')[1],mime:f.type||'image/jpeg',index:i,status:'pending'});
      const w=document.createElement('div');w.className='thumb';w.id='tw'+i;
      const img=document.createElement('img');img.src=e.target.result;
      const st=document.createElement('div');st.className='tstat pending';st.id='ts'+i;st.textContent='Pending';
      w.appendChild(img);w.appendChild(st);document.getElementById('bulk-thumbs').appendChild(w);
    };
    reader.readAsDataURL(f);
  });
}

async function processBulk(){
  const branch=document.getElementById('s-branch').value;
  if(!branch){setSt('bulk-st','Select your branch first.','error');return;}
  if(!S.bulkQ.length){setSt('bulk-st','No files selected.','error');return;}
  setSt('bulk-st','Processing '+S.bulkQ.length+' invoices — please wait...','info');
  let done=0,saved=0,failed=0;const total=S.bulkQ.length;
  for(let i=0;i<S.bulkQ.length;i++){
    const item=S.bulkQ[i];const ts=document.getElementById('ts'+item.index);
    if(ts){ts.className='tstat processing';ts.textContent='Reading...';}
    setP('bp','bpb',Math.round(i/total*100));
    try{
      const ex=await extract(item.b64,item.mime);
      const inv=buildInv(ex,branch,'bulk');S.invoices.push(inv);pushGS(inv);saved++;item.status='done';
      if(ts){ts.className='tstat done';ts.textContent='Saved';}
    }catch(e){failed++;item.status='err';if(ts){ts.className='tstat err';ts.textContent='Failed';}}
    done++;setP('bp','bpb',Math.round(done/total*100));
  }
  setP('bp','bpb',100);setTimeout(()=>setP('bp','bpb',null),500);
  popMonths();
  setSt('bulk-st',saved+' saved'+(failed?' · '+failed+' failed':'')+'.', failed?'warn':'success');
}

function clearBulk(){S.bulkQ=[];document.getElementById('bulk-thumbs').innerHTML='';document.getElementById('bulk-thumbs').style.display='none';document.getElementById('bulk-actions').style.display='none';document.getElementById('bulk-fi').value='';document.getElementById('bulk-st').className='st';}

// SINGLE
function handleSingle(file){if(!file)return;const reader=new FileReader();reader.onload=e=>{S.curB64=e.target.result.split(',')[1];S.curMime=file.type||'image/jpeg';document.getElementById('prev').src=e.target.result;document.getElementById('single-body').style.display='block';doExtract();};reader.readAsDataURL(file);}

async function doExtract(){
  setSt('single-st','Extracting...','info');setP('sp','spb',30);document.getElementById('save-btn').disabled=true;
  try{
    const ex=await extract(S.curB64,S.curMime);
    document.getElementById('f-date').value=ex.date||'';document.getElementById('f-sup').value=ex.supplier||'';document.getElementById('f-inv').value=ex.invoiceNum||'';document.getElementById('f-tot').value=ex.total||'';document.getElementById('f-gst').value=ex.gst||'';document.getElementById('f-sub').value=ex.subtotal||'';
    S.curItems=ex.lineItems||[];
    document.getElementById('li-disp').innerHTML=S.curItems.length?S.curItems.map(it=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border);font-size:12px"><span>${it.desc}${it.qty?' ×'+it.qty:''}</span><span style="font-weight:500">$${(it.amount||0).toFixed(2)}</span></div>`).join(''):'No line items.';
    setP('sp','spb',100);setTimeout(()=>setP('sp','spb',null),400);
    setSt('single-st','Done — review and save.','success');document.getElementById('save-btn').disabled=false;
  }catch(e){setP('sp','spb',null);setSt('single-st','Extraction failed. Fill manually.','error');document.getElementById('save-btn').disabled=false;}
}

function resetSingle(){document.getElementById('single-body').style.display='none';document.getElementById('sfi').value='';S.curB64=null;S.curItems=[];}

function saveSingle(){
  const branch=document.getElementById('s-branch').value;
  if(!branch){setSt('single-st','Select your branch.','error');return;}
  const inv=buildInv({date:document.getElementById('f-date').value,supplier:document.getElementById('f-sup').value,invoiceNum:document.getElementById('f-inv').value,total:+document.getElementById('f-tot').value||0,gst:+document.getElementById('f-gst').value||0,subtotal:+document.getElementById('f-sub').value||0,lineItems:S.curItems},branch,'scan');
  if(!inv.supplier){setSt('single-st','Supplier name required.','error');return;}
  S.invoices.push(inv);pushGS(inv);popMonths();
  setSt('single-st','Invoice saved successfully.','success');
}

// RECORDS
function popMonths(){
  const months=[...new Set(S.invoices.map(i=>({m:i.monthNum,l:i.month})).filter(x=>x.l).map(x=>JSON.stringify(x)))].map(x=>JSON.parse(x)).sort((a,b)=>a.m-b.m);
  const s=document.getElementById('r-month');const c=s.value;
  s.innerHTML='<option value="">All months</option>'+months.map(m=>`<option value="${m.m}">${m.l}</option>`).join('');s.value=c;
}

function renderRecords(){
  const br=document.getElementById('r-branch').value;
  const mo=document.getElementById('r-month').value;
  const invs=S.invoices.filter(i=>(!br||i.branch===br)&&(!mo||String(i.monthNum)===String(mo)));
  const mc=document.getElementById('r-metrics');const rb=document.getElementById('r-body');
  if(!invs.length){mc.innerHTML='';rb.innerHTML='<div class="empty">No records yet. Scan your first invoice!</div>';return;}
  const tot=invs.reduce((s,i)=>s+i.total,0);const gst=invs.reduce((s,i)=>s+i.gst,0);
  mc.innerHTML=`<div class="metric"><div class="mlabel">Total spend</div><div class="mval">$${tot.toFixed(2)}</div></div><div class="metric"><div class="mlabel">GST</div><div class="mval">$${gst.toFixed(2)}</div></div><div class="metric"><div class="mlabel">Invoices</div><div class="mval">${invs.length}</div></div>`;
  rb.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>Source</th><th>Branch</th><th>Date</th><th>Supplier</th><th>Invoice</th><th style="text-align:right">Total</th></tr></thead><tbody>${invs.sort((a,b)=>b.id-a.id).map(i=>`<tr><td><span class="src-tag src-${i.source}">${i.source}</span></td><td><span class="bpill">${i.branch}</span></td><td style="white-space:nowrap;font-size:12px">${i.date||'—'}</td><td style="font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.supplier}</td><td style="font-family:var(--mono);font-size:11px;color:var(--text2)">${i.invoiceNum||'—'}</td><td style="text-align:right;font-weight:500">$${i.total.toFixed(2)}</td></tr>`).join('')}</tbody></table></div><div style="display:flex;justify-content:flex-end;gap:16px;padding:10px 12px;font-size:12px;color:var(--text2);border-top:0.5px solid var(--border)"><span>GST: <strong>$${gst.toFixed(2)}</strong></span><span>Total: <strong>$${tot.toFixed(2)}</strong></span></div>`;
}

function exportCSV(){
  if(!S.invoices.length)return;
  const h='Source,Branch,Date,Supplier,Invoice No,Total,GST,Subtotal\n';
  const rows=S.invoices.map(i=>[i.source,i.branch,i.date,i.supplier,i.invoiceNum,i.total.toFixed(2),i.gst.toFixed(2),i.subtotal.toFixed(2)].join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([h+rows],{type:'text/csv'}));a.download='invoices-staff.csv';a.click();
}
</script>
</body>
</html>
